apiVersion: v1
kind: Service
metadata:
  name: {{ include "cas-whiteboard.fullname" . }}-redis
  labels:
    {{- include "cas-whiteboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: {{ include "cas-whiteboard.fullname" . }}-redis
  selector:
    {{- include "cas-whiteboard.selectorLabels" . | nindent 4 }}
    component: redis
