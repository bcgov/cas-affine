apiVersion: v1
kind: Service
metadata:
  name: {{ include "cas-whiteboard.fullname" . }}
  labels:
    {{- include "cas-whiteboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: {{ include "cas-whiteboard.fullname" . }}-port
  selector:
    {{- include "cas-whiteboard.selectorLabels" . | nindent 4 }}
    component: affine
